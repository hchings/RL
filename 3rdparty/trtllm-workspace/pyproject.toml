# Workspace wrapper for TensorRT-LLM.
#
# This package exposes tensorrt-llm as a path source so that:
#   - `uv lock` can resolve the dep graph without building the wheel
#     (prepare_metadata_for_build_wheel returns static metadata fast).
#   - `uv sync --extra trtllm` triggers the actual ~60-min wheel build
#     (build_wheel in _backend.py calls tools/build-custom-trtllm.sh).
#
# Declared as no-build-isolation-package in the root pyproject.toml so the
# build runs in the main venv context and has access to torch / CUDA headers.
#
# To control which fork/ref is built, set these env vars before `uv sync`:
#   BUILD_CUSTOM_TRTLLM_URL        (default: https://github.com/shuyixiong/TensorRT-LLM.git)
#   BUILD_CUSTOM_TRTLLM_REF        (default: nemorl)
#   BUILD_CUSTOM_TRTLLM_MODELOPT_URL  (default: https://github.com/NVIDIA/TensorRT-Model-Optimizer.git)
#   BUILD_CUSTOM_TRTLLM_MODELOPT_REF  (default: 0.37.0)
#
# Sourced from requirements.txt on github.com/shuyixiong/TensorRT-LLM@nemorl.
# Intentional omissions from requirements.txt:
#   - datasets==3.1.0        → conflicts with nemorl base datasets>=4.0.0
#   - setuptools<80          → conflicts with nemorl override setuptools>=80.10.2
#   - llguidance==0.7.29     → conflicts with nemorl override llguidance>=1.3.0,<1.4.0
#   - triton==3.6.0          → nemorl base manages triton via pytorch-cu130 index
#   - evaluate               → pulls in conflicting datasets==3.1.0 transitively
#   - build / ninja / meson / patchelf  → build-time only, not runtime deps
#   - cuda-core              → included in cuda-python>=13
#   - graphviz / polygraphy / mcp  → optional dev/test tools

[project]
name = "tensorrt-llm"
version = "1.3.0rc21"
requires-python = ">=3.13"
dependencies = [
  "tensorrt~=10.16.1",
  "mpi4py",
  "numpy>=2.0.0,<2.4",
  "torch>=2.11.0",
  "torchvision",
  "nvidia-modelopt>=0.37.0",
  "nvidia-nccl-cu13>=2.28.9,<=2.29.7",
  "nvidia-cuda-nvrtc",
  "nvidia-cutlass-dsl[cu13]==4.5.0",
  "nvidia-ml-py>=13",
  "cuda-python>=13",
  "flash-attn-4==4.0.0b11",
  "flashinfer-python==0.6.12",
  "torchao>=0.14.1,<0.16.0",
  "apache-tvm-ffi==0.1.6",
  "torch-c-dlpack-ext==0.1.3",
  "xdsl>=0.59.0",
  "cuda-tile>=1.0.1",
  "nvidia-cuda-tileiras>=13.1,<13.2",
  "transformers==5.5.4",
  "accelerate>=1.7.0",
  "sentencepiece>=0.1.99",
  "mistral-common>=1.10.0",
  "tiktoken",
  "diffusers>=0.37.1",
  "peft>=0.18.1",
  "optimum",
  "ftfy",
  "xgrammar>=0.1.32",
  "lark",
  "partial_json_parser",
  "onnx>=1.21.0",
  "onnx_graphsurgeon>=0.5.2",
  "fastapi>=0.120.1",
  "starlette>=0.49.1",
  "uvicorn",
  "pydantic>=2.9.1",
  "pydantic-settings[yaml]",
  "python-multipart",
  "prometheus_client",
  "prometheus-fastapi-instrumentator>=8.0.2",
  "openai-harmony==0.0.4",
  "etcd-sdk-python==0.0.7",
  "smg-grpc-proto>=0.4.2",
  "cache-dit>=1.3.5",
  "pillow",
  "opencv-python-headless",
  "soundfile",
  "librosa",
  "h5py==3.12.1",
  "pandas",
  "numexpr",
  "mpmath>=1.3.0",
  "colored",
  "psutil",
  "omegaconf",
  "pyzmq",
  "einops",
  "aenum",
  "strenum",
  "llguidance>=1.3.0,<1.4.0",
  "backoff",
  "jsonschema",
  "click>=8.3.1",
