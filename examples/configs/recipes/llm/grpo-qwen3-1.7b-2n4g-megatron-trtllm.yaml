defaults: ../../grpo_math_1B.yaml

# Non-colocated GRPO on Qwen3-1.7B with TRT-LLM inference:
#   4 GPUs Megatron training (TP=2, DP=2) + 4 GPUs TRT-LLM generation (TP=1, DP=4)

grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 4
  max_num_steps: 100
  val_period: 50
  max_val_samples: 64
  val_batch_size: 64

checkpointing:
  enabled: false
  checkpoint_dir: results/grpo-qwen3-1.7b-2n4g-megatron-trtllm
  save_period: 25

policy:
  model_name: Qwen/Qwen3-1.7B
  tokenizer:
    name: ${policy.model_name}
  max_total_sequence_length: 2048
  train_global_batch_size: 16
  generation_batch_size: 4
  logprob_batch_size: 4
  make_sequence_length_divisible_by: 1

  dtensor_cfg:
    enabled: false

  megatron_cfg:
    enabled: true
    converter_type: Qwen3ForCausalLM
    tensor_model_parallel_size: 2
    moe_permute_fusion: false
    attention_backend: flash
    scheduler:
      lr_warmup_iters: 20
    distributed_data_parallel_config:
      average_in_collective: true
    fp8_cfg:
      fp8: hybrid
      fp8_recipe: tensorwise

  optimizer: null
  scheduler:
    - name: torch.optim.lr_scheduler.LinearLR
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 20
    - name: torch.optim.lr_scheduler.ConstantLR
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: [20]

  generation:
    backend: trtllm
    trtllm_cfg:
      tensor_parallel_size: 1
      precision: ${policy.precision}
      max_model_len: ${policy.max_total_sequence_length}
      max_batch_size: 16
      max_num_tokens: 4096
    colocated:
      enabled: false
      resources:
        gpus_per_node: 4
        num_nodes: 1

logger:
  log_dir: logs/grpo-qwen3-1.7b-2n4g-megatron-trtllm
  monitor_gpus: false
  wandb_enabled: true
  wandb:
    project: grpo-trtllm-v2
    name: grpo-qwen3-1.7b-2n4g-megatron-trtllm

cluster:
  gpus_per_node: 4
  num_nodes: 2
